name: "Marstek Jupiter C+"
version: "1.0.0"
slug: marstek_jupiter_c_plus
description: "Home Assistant Add-on für Marstek Jupiter C+ Energiespeicher"
arch:
  - armv7
  - aarch64
  - amd64
url: "https://github.com/Nemeson/marstek-jupiter-ha-addon"
apptitle: "Marstek Jupiter C+ Integration"
init: false
startup: application
boot: auto
services:
  - mqtt:need
ports:
  8099/tcp: 8099
watchdog: "http://[HOST]:8099/health"
options:
  mqtt_broker_url: "mqtt://core-mosquitto:1883"
  mqtt_username: ""
  mqtt_password: ""
  topic_prefix: "marstek_jupiter"
  device_type: "JPLS_8H"
  device_id: "YOUR_MAC_ADDRESS_HEX"
  broker_id: "hame-2025"
  cloud_broker_url: "mqtts://mqtt.hamedata.com:8883"
  cloud_username: ""
  cloud_password: ""
  use_cloud_bridge: false
  polling_interval: 60
  response_timeout: 30
  enable_cell_data: true
  log_level: info
  health_port: 8099
schema:
  mqtt_broker_url: str
  mqtt_username: str?
  mqtt_password: str?
  topic_prefix: str
  device_type: list(JPLS_8H|HMM-1|HMN-1)
  device_id: str
  broker_id: list(hame-2024|hame-2025)
  cloud_broker_url: str
  cloud_username: str?
  cloud_password: str?
  use_cloud_bridge: bool
  polling_interval: int(10,3600)
  response_timeout: int(5,300)
  enable_cell_data: bool
  log_level: list(trace|debug|info|warning|error)
  health_port: port
map:
  - addon_config:rw
image: "ghcr.io/nemeson/marstek-jupiter-ha-addon-{arch}"
